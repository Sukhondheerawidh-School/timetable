services:
  timetable-app:
    build: .
    container_name: timetable-app
    ports:
      - "8080:80"
    volumes:
      - /home/sukhon_server/timetable/.env:/var/www/html/.env
    environment:
      # secret ร่วมกับ schoolos-portal สำหรับตรวจ JWT (SSO)
      # ใส่ในไฟล์ .env ที่ mount ด้านบนแทนก็ได้ (config.php โหลดให้เอง)
      - JWT_SECRET=${JWT_SECRET:-}
    depends_on:
      - timetable-db
    restart: always
    networks:
      - default
      # join network เดียวกับ school-gateway เพื่อให้ nginx route /timetable/ มาถึง
      # สร้างครั้งแรก: docker network create school-net
      - school-net

  timetable-db:
    image: mysql:8
    container_name: timetable-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: School1234
      MYSQL_DATABASE: timetable
      MYSQL_USER: timetable_user
      MYSQL_PASSWORD: School1234
    volumes:
      - timetable_db_data:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: timetable-phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: timetable-db
    depends_on:
      - timetable-db
volumes:
  timetable_db_data:

networks:
  school-net:
    external: true
